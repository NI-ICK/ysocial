<div class="container">
  <div class="home">
    <create-post-form></create-post-form>

    <ng-container *ngIf="posts$ | async as posts">
      <ng-container *ngFor="let post of posts">
        <post-card [post]="post"></post-card>
      </ng-container>

      <ng-container *ngIf="postsLoading$ | async">
        <loading></loading>
      </ng-container>

      <ng-container *ngIf="noMorePosts$ | async as noMore">
        <p *ngIf="!posts.length && noMore" class="info">
          Nothing to see here...
        </p>
      </ng-container>
    </ng-container>
    <div
      infiniteScroll
      [infiniteScrollThrottle]="1000"
      [infiniteScrollDistance]="5"
      (scrolled)="onScroll()"
    ></div>
  </div>
</div>
