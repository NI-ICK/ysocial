<div class="container">
  <div class="content">
    <div class="links">
      <a [routerLink]="['/', username, 'followers']" class="active"
        >Followers</a
      >
      <a [routerLink]="['/', username, 'following']">Following</a>
    </div>

    <ng-container *ngIf="followersLoading$ | async">
      <loading></loading>
    </ng-container>

    <ng-container *ngIf="followers$ | async as followers">
      <ng-container *ngFor="let user of followers">
        <user-card [user]="user"></user-card>
      </ng-container>

      <ng-container *ngIf="noMoreFollowers$ | async as noMore">
        <p *ngIf="!followers.length && noMore" class="info">
          Nothing to see here...
        </p>
      </ng-container>
    </ng-container>
    <div
      infiniteScroll
      [infiniteScrollThrottle]="1000"
      [infiniteScrollDistance]="5"
      (scrolled)="onScroll()"
    ></div>
  </div>
</div>
